name: Build Wheels

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch || 'x86_64' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x86_64

          # Windows
          - os: windows-latest
            platform: windows
            arch: AMD64

          # macOS 13 - Intel
          - os: macos-13
            platform: macos
            arch: x86_64

          # macOS 14 - ARM (M1/M2/M3)
          - os: macos-14
            platform: macos
            arch: arm64

          # macOS 15 - ARM (M3/M4)
          - os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel pybind11

      - name: Build wheels (Linux)
        if: matrix.platform == 'linux'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_BUILD: "pip install pybind11"
          # Allow auditwheel to fail (copy wheel as-is)
          CIBW_REPAIR_WHEEL_COMMAND: "auditwheel repair -w {dest_dir} {wheel} 2>/dev/null || cp {wheel} {dest_dir}/"

      - name: Build wheels (Windows)
        if: matrix.platform == 'windows'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-win32"
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD: "pip install pybind11"

      - name: Build wheels (macOS Intel)
        if: matrix.platform == 'macos' && matrix.arch == 'x86_64'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BEFORE_BUILD: "pip install pybind11"
          MACOSX_DEPLOYMENT_TARGET: "10.14"
          CIBW_REPAIR_WHEEL_COMMAND: "delocate-wheel -w {dest_dir} -v {wheel} 2>/dev/null || cp {wheel} {dest_dir}/"

      - name: Build wheels (macOS ARM)
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_MACOS: arm64
          CIBW_BEFORE_BUILD: "pip install pybind11"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CIBW_REPAIR_WHEEL_COMMAND: "delocate-wheel -w {dest_dir} -v {wheel} 2>/dev/null || cp {wheel} {dest_dir}/"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}
          path: python/wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: warn

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false
