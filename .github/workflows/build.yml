name: Build Wheels

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-13
            platform: macos
            arch: x86_64
          - os: macos-14
            platform: macos
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels (Linux)
        if: matrix.platform == 'linux'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          # Pre-install pybind11 in the build environment
          CIBW_BEFORE_BUILD: "pip install pybind11"
          # Allowlibstdc++ dynamic linking
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel} || cp {wheel} {dest_dir}/"

      - name: Build wheels (Windows)
        if: matrix.platform == 'windows'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-win32"
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD: "pip install pybind11"

      - name: Build wheels (macOS)
        if: matrix.platform == 'macos'
        run: cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_BEFORE_BUILD: "pip install pybind11"
          # macOS deployment target
          MACOSX_DEPLOYMENT_TARGET: "10.14"
          # Don't require specific arch check
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs=${{ matrix.arch }} -w {dest_dir} -v {wheel} || delocate-wheel -w {dest_dir} -v {wheel}"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}
          path: python/wheelhouse/*.whl
          retention-days: 30

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/
        working-directory: .

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
          generate_release_notes: true
