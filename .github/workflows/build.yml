name: Build Wheels with BoringSSL

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch || 'x86_64' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: AMD64
          - os: macos-13
            platform: macos
            arch: x86_64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

      - name: Install Ninja and NASM (Windows)
        if: matrix.platform == 'windows'
        run: |
          choco install ninja nasm -y

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build BoringSSL (Unix)
        if: matrix.platform != 'windows'
        run: |
          set -ex
          echo "Building BoringSSL..."
          echo "Source: $PWD/third_party/boringssl"
          ls -la third_party/boringssl/

          mkdir -p build/boringssl
          cd build/boringssl

          cmake ../../third_party/boringssl \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DOPENSSL_SMALL=1

          ninja -v

          echo "Build complete. Contents of build dir:"
          ls -la

          # Create install directory
          mkdir -p ../../third_party/boringssl/install/lib
          mkdir -p ../../third_party/boringssl/install/include

          # Copy libraries
          if [ -f libssl.a ]; then
            cp libssl.a ../../third_party/boringssl/install/lib/
            cp libcrypto.a ../../third_party/boringssl/install/lib/
            echo "Copied static libraries:"
            ls -la ../../third_party/boringssl/install/lib/
          elif [ -f libssl.dylib ]; then
            cp libssl.dylib ../../third_party/boringssl/install/lib/
            cp libcrypto.dylib ../../third_party/boringssl/install/lib/
            echo "Copied dynamic libraries:"
            ls -la ../../third_party/boringssl/install/lib/
          else
            echo "ERROR: Could not find BoringSSL libraries!"
            find . -name "*.a" -o -name "*.dylib" -o -name "*.lib" 2>/dev/null
            exit 1
          fi

          # Copy headers
          cp -r ../../third_party/boringssl/include/* ../../third_party/boringssl/install/include/

          echo "BoringSSL installation complete:"
          ls -la ../../third_party/boringssl/install/
          ls -la ../../third_party/boringssl/install/lib/
          ls -la ../../third_party/boringssl/install/include/

      - name: Build BoringSSL (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          echo Building BoringSSL...
          echo Source: %CD%\third_party\boringssl
          dir /s third_party\boringssl

          mkdir build\boringssl
          cd build\boringssl

          cmake ..\..\third_party\boringssl ^
            -GNinja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DOPENSSL_SMALL=1

          ninja -v

          echo Build complete. Contents of build dir:
          dir

          mkdir ..\..\third_party\boringssl\install\lib
          mkdir ..\..\third_party\boringssl\install\include

          if exist ssl.lib (
            copy ssl.lib ..\..\third_party\boringssl\install\lib\
            copy crypto.lib ..\..\third_party\boringssl\install\lib\
            echo Copied Windows libraries:
            dir ..\..\third_party\boringssl\install\lib
          ) else (
            echo ERROR: Could not find BoringSSL libraries!
            dir /s /b *.lib
            exit 1
          )

          xcopy ..\..\third_party\boringssl\include\* ..\..\third_party\boringssl\install\include\ /E /Y

          echo BoringSSL installation complete:
          dir ..\..\third_party\boringssl\install\
          dir ..\..\third_party\boringssl\install\lib\
          dir ..\..\third_party\boringssl\install\include\

      - name: Build wheels
        run: |
          echo "Python directory contents:"
          ls -la python/
          echo "Python src contents:"
          ls -la python/src/ 2>/dev/null || echo "No src dir"
          echo "Python include contents:"
          ls -la python/include/ 2>/dev/null || echo "No include dir"
          echo "BoringSSL install contents:"
          ls -la third_party/boringssl/install/ 2>/dev/null || echo "No install dir"
          echo "BoringSSL lib contents:"
          ls -la third_party/boringssl/install/lib/ 2>/dev/null || echo "No lib dir"

          cibuildwheel --output-dir wheelhouse
        working-directory: python
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux_* *-win32"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ARCHS_MACOS: ${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}
          CIBW_BEFORE_BUILD: "pip install pybind11"
          CIBW_ENVIRONMENT: >-
            BORINGSSL_INCLUDE=/project/third_party/boringssl/install/include
            BORINGSSL_LIB=/project/third_party/boringssl/install/lib
          CIBW_ENVIRONMENT_WINDOWS: >-
            BORINGSSL_INCLUDE=D:\a\dc-reverse\boringssl_tls_for_python\dc-reverse\boringssl_tls_for_python\third_party\boringssl\install\include
            BORINGSSL_LIB=D:\a\dc-reverse\boringssl_tls_for_python\dc-reverse\boringssl_tls_for_python\third_party\boringssl\install\lib
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.arch == 'arm64' && '11.0' || '10.14' }}
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel} 2>/dev/null || cp {wheel} {dest_dir}/"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel -w {dest_dir} -v {wheel} 2>/dev/null || cp {wheel} {dest_dir}/"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch || 'x86_64' }}
          path: python/wheelhouse/*.whl
          retention-days: 30
          if-no-files-found: warn

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: false
